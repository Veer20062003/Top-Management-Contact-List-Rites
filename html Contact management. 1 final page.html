<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Contact Directory</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;   /* Rich Corporate Yellow */    
            --dark-accent: #333;
            --row-even: #fffdf2;
            --row-odd: #ffffff;
            --delete-red: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 3px solid var(--primary-yellow); display: inline-block; width: 100%; padding-bottom: 10px; }

        /* Controls Section */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; background: #fafafa; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        input { flex: 1; min-width: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: var(--primary-yellow); outline: none; box-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }

        .btn-add { background: var(--primary-yellow); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #e6b800; transform: translateY(-2px); }

        /* Search Bar */
        .search-box { width: 100%; margin-bottom: 20px; padding: 12px; border: 2px solid var(--primary-yellow); border-radius: 50px; text-align: center; }

        /* Table Styling */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--primary-yellow); color: #000; padding: 15px; text-align: left; border: 1px solid #e6b800; }
        td { padding: 15px; border: 1px solid #eee; font-size: 14px; }
        tr:nth-child(even) { background: var(--row-even); }
        tr:hover { background: #fff9db; }

        .btn-delete { color: var(--delete-red); border: none; background: none; cursor: pointer; font-size: 18px; }
        .btn-delete:hover { color: #c0392b; }
        
        .email-link { color: #2980b9; text-decoration: none; font-weight: 500; }
        .email-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Top Management Directory For Rites</h2>

    <!-- Search Tool -->
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by Name, Designation or Dept ID..." onkeyup="filterTable()">

    <!-- Form -->
    <div class="controls">
        <input type="text" id="name" placeholder="Name (Shri/Smt)">
        <input type="text" id="designation" placeholder="Designation">
        <input type="text" id="phone" placeholder="Phone (Office)">
        <input type="email" id="email" placeholder="E-Mail ID">
        <input type="text" id="deptId" placeholder="Dept ID">
        <button class="btn-add" onclick="addContact()">+ Add Contact</button>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                     
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Designation</th>
                    <th>Phone</th>
                    <th>E-Mail ID</th>
                    <th>Dept ID</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let contacts = JSON.parse(localStorage.getItem('myContacts')) || [];

    // Load data on start
    window.onload = renderTable;

    function addContact() {
        const data = {
            name: document.getElementById('name').value,
            designation: document.getElementById('designation').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            deptId: document.getElementById('deptId').value
        };

        if(data.name && data.designation) {
            contacts.push(data);
            saveAndRender();
            clearForm();
        } else {
            alert("Please enter at least a Name and Designation");
        }
    }

    function deleteContact(index) {
        if(confirm("Delete this entry?")) {
            contacts.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('myContacts', JSON.stringify(contacts));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = contacts.map((c, i) => `
            <tr>
                <td><strong>${i + 1}</strong></td>
                <td>${c.name}</td>
                <td>${c.designation}</td>
                <td>${c.phone}</td>
                <td><a href="mailto:${c.email}" class="email-link">${c.email}</a></td>
                <td><span style="background:#eee; padding:2px 8px; border-radius:4px;">${c.deptId}</span></td>
                <td><button class="btn-delete" onclick="deleteContact(${i})">🗑️</button></td>
            </tr>
        `).join('');
    }

    function filterTable() {
        let filter = document.getElementById('searchInput').value.toUpperCase();
        let tr = document.getElementById('tableBody').getElementsByTagName('tr');
        
        for (let i = 0; i < tr.length; i++) {
            let text = tr[i].innerText.toUpperCase();
            tr[i].style.display = text.indexOf(filter) > -1 ? "" : "none";
        }
    }

    function clearForm() {
        document.querySelectorAll('.controls input').forEach(i => i.value = '');
    }
</script>

</body>
</html>
